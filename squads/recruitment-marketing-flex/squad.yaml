    - Meta Ads (Facebook & Instagram)
  secondary:
    - Bing Ads (Microsoft Advertising)
    - Reddit Ads
    - Craigslist
    - LinkedIn Ads
  programmatic:
    - Appcast
    - Joveo
    - PandoLogic

industry:
  vertical: Staffing & Recruitment
  client: Indeed Flex
  focus: Temporary & flexible workforce candidate acquisition

