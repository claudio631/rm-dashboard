  - google-ads/display-network-guide.md
  - google-ads/ai-automation-guide.md
  - google-ads/mobile-optimization-guide.md
  - google-ads/lead-generation-guide.md
  # reddit-ads/ — Reddit Ads knowledge base
  - reddit-ads/playbook.md
  # copy/ — Copywriter KB (brand voice, EEOC, Indeed best practices, job hooks)
  - copy/indeed-ads-best-practices.md
  - copy/brand-voice-guide.md
  - copy/eeoc-language-guide.md
