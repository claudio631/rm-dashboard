# Industry Benchmarks — Recruitment Marketing (Staffing/Temp)
# Source: Aggregated from industry reports, Appcast, CPC Strategy, Recruitics
# Last Updated: 2026-03-16
# Note: Benchmarks vary by market, job type, and season. Use as directional guidance.

staffing_recruitment_benchmarks:

  indeed_ads:
    cpc: { low: 0.20, median: 0.50, high: 1.50, unit: USD }
    cpa: { low: 5.00, median: 15.00, high: 40.00, unit: USD }
    apply_rate: { low: 3.0, median: 7.0, high: 15.0, unit: percent }
    ctr: { low: 2.0, median: 5.0, high: 12.0, unit: percent }
    notes: "Indeed PPC varies heavily by job title competitiveness and market"

  google_ads_search:
    cpc: { low: 0.80, median: 2.50, high: 6.00, unit: USD }
    cpa: { low: 15.00, median: 35.00, high: 80.00, unit: USD }
    ctr: { low: 2.5, median: 4.5, high: 8.0, unit: percent }
    quality_score: { low: 4, median: 6, high: 9, unit: "out of 10" }
    impression_share: { low: 20, median: 45, high: 75, unit: percent }
    notes: "Recruitment keywords are competitive; long-tail + location reduces CPC"

  google_ads_pmax:
    cpa: { low: 10.00, median: 25.00, high: 60.00, unit: USD }
    roas: { low: 1.5, median: 3.0, high: 8.0, unit: "x" }
    notes: "Performance Max works well with strong conversion data (50+ conversions/month)"

  meta_ads:
    cpm: { low: 5.00, median: 12.00, high: 25.00, unit: USD }
    cpc: { low: 0.50, median: 1.50, high: 4.00, unit: USD }
    cpa: { low: 8.00, median: 20.00, high: 50.00, unit: USD }
    ctr: { low: 0.8, median: 1.5, high: 3.0, unit: percent }
    lead_gen_cpl: { low: 3.00, median: 10.00, high: 25.00, unit: USD }
    notes: "Lead gen forms significantly reduce CPA vs landing page traffic"

  bing_ads:
    cpc: { low: 0.50, median: 1.80, high: 4.50, unit: USD }
    cpa: { low: 12.00, median: 30.00, high: 70.00, unit: USD }
    ctr: { low: 2.0, median: 3.5, high: 6.0, unit: percent }
    notes: "Generally 20-30% lower CPC than Google; smaller audience but less competition"

  reddit_ads:
    cpm: { low: 3.00, median: 8.00, high: 15.00, unit: USD }
    cpc: { low: 0.30, median: 1.00, high: 3.00, unit: USD }
    ctr: { low: 0.3, median: 0.8, high: 2.0, unit: percent }
    notes: "Newer ad platform; strong for gig/flex worker audience; community tone matters"

  craigslist:
    cost_per_posting: { low: 0, median: 10.00, high: 75.00, unit: USD }
    response_rate: { low: 1.0, median: 3.0, high: 8.0, unit: percent }
    notes: "Cost varies by metro. Free in some markets, up to $75 in major cities"

  programmatic_job_ads:
    cpc: { low: 0.15, median: 0.40, high: 1.00, unit: USD }
    cpa: { low: 5.00, median: 12.00, high: 30.00, unit: USD }
    notes: "Appcast, Joveo, PandoLogic. Best for volume at scale with automated optimization"

full_funnel_benchmarks:
  apply_to_screen_rate: { low: 30, median: 50, high: 75, unit: percent }
  screen_to_interview_rate: { low: 25, median: 40, high: 60, unit: percent }
  interview_to_hire_rate: { low: 20, median: 35, high: 55, unit: percent }
  overall_apply_to_hire: { low: 2, median: 7, high: 15, unit: percent }
  blended_cost_per_hire: { low: 50, median: 200, high: 500, unit: USD }
  time_to_fill_days: { low: 3, median: 10, high: 30, unit: days }

seasonal_adjustments:
  q1_jan_mar: { modifier: 0.9, notes: "Post-holiday slowdown, lower competition" }
  q2_apr_jun: { modifier: 1.0, notes: "Baseline — spring hiring ramp" }
  q3_jul_sep: { modifier: 1.1, notes: "Back-to-school, seasonal surge starts" }
  q4_oct_dec: { modifier: 1.3, notes: "Holiday surge — highest demand and CPC for temp/warehouse" }
